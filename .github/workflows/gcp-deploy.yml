name: Deploy to Goggle App Engine (GAE)

on:
  push:
    branches:
      - main

jobs:
  security-scan:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Cache Angular CLI build cache
        uses: actions/cache@v4
        with:
          path: .angular/cache
          key: ${{ runner.os }}-angular-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-angular-

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies for vulnerabilities
        run: npm audit --audit-level=critical

      - name: Check for outdated dependencies
        run: npm outdated || true

      - name: Static analysis (ESLint)
        run: npm run lint

      - name: Run unit tests with coverage
        run: npm test -- --watch=false --browsers=ChromeHeadless --code-coverage

      - name: Check coverage thresholds
        if: always()
        continue-on-error: true
        run: |
          node -e "
            const summary = require('./coverage/iverbs/coverage-summary.json');
            const actual = summary.total;
            const thresholds = { statements: 70, branches: 60, functions: 70, lines: 70 };
            let belowThreshold = false;
            for (const [metric, min] of Object.entries(thresholds)) {
              const pct = actual[metric].pct;
              if (pct < min) {
                console.log('::warning::Coverage for ' + metric + ' (' + pct + '%) is below threshold (' + min + '%)');
                belowThreshold = true;
              }
            }
            if (belowThreshold) process.exit(1);
            else console.log('All coverage thresholds met.');
          "

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: coverage/iverbs/
          retention-days: 14

      - name: SonarCloud Scan
        if: ${{ vars.SONAR_ORGANIZATION != '' && vars.SONAR_PROJECT_KEY != '' }}
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-and-quality

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"

  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Cache Angular CLI build cache
        uses: actions/cache@v4
        with:
          path: .angular/cache
          key: ${{ runner.os }}-angular-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-angular-

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build app for E2E (static SPA; no SSR / route extraction)
        run: npm run build:e2e

      - name: Serve app and run Playwright E2E tests
        run: |
          npx http-server dist/browser -p 4200 --silent --proxy http://localhost:4200? &
          sleep 3
          BASE_URL=http://localhost:4200 npx playwright test --project=chromium

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  build-and-deploy:
    runs-on: ubuntu-latest
    needs: [security-scan, e2e]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js and yarn
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Cache Angular CLI build cache
        uses: actions/cache@v4
        with:
          path: .angular/cache
          key: ${{ runner.os }}-angular-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-angular-

      - name: Install dependencies
        run: npm ci

      # Skip Piscina-based route discovery during build. On some Linux/CI runners the worker can
      # reject with a non-Error value, which triggers Angular's assertIsError and fails the build
      # with "catch clause variable is not an Error instance". Runtime still builds the route tree
      # on first request (see ServerRouter.from when manifest.routes is undefined).
      - name: Build Node Project
        env:
          NG_BUILD_PARTIAL_SSR: "true"
        run: npm run build:prod

      - name: Create assets/config.json
        run: |
          mkdir -p dist/browser/assets
          echo '{"API_KEY": "${{ secrets.API_SECRET_KEY }}"}' > dist/browser/assets/config.json

      - name: Google Cloud Auth
        uses: "google-github-actions/auth@v2"
        with:
          credentials_json: "${{ secrets.GCP_SA_KEY }}"
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Set up Cloud SDK
        uses: "google-github-actions/setup-gcloud@v2"

      - name: Deploy to Google App Engine
        run: |
          gcloud app deploy client.yaml dispatch.yaml --quiet --no-cache
