# SonarCloud analysis (see docs/ANGULAR_CLI.md for GitHub setup).
# Organization and project key are passed from GitHub Actions repository variables
# SONAR_ORGANIZATION and SONAR_PROJECT_KEY via the scanner -D flags.

sonar.projectName=Iverbs (Angular client)

sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.spec.ts
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**

sonar.javascript.lcov.reportPaths=coverage/iverbs/lcov.info

sonar.sourceEncoding=UTF-8
