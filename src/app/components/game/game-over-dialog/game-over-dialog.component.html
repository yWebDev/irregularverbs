<h2 class="title" mat-dialog-title id="game-over-title">
  {{ data.isCompleted ? "Congratulations!" : "Game Over" }}
</h2>
<mat-dialog-content id="game-over-content" aria-describedby="game-over-title">
  @if (data.isCompleted) {
    <p>Well done! You managed to drop all forms correctly!</p>
  }
  <p>
    Your Time:&nbsp;<span class="text-active">{{ data.time }}</span> sec
  </p>
  <p>
    Your Score:&nbsp;<span class="text-active">{{ data.score }}</span>
  </p>
</mat-dialog-content>
<mat-dialog-actions align="center">
  <button mat-button mat-dialog-close aria-label="Close game over dialog">Close</button>
</mat-dialog-actions>
