<div class="game" role="main" aria-label="Irregular Verbs Game">
  <div class="game-counter" aria-label="Game timer">
    Time spent:&nbsp;<span class="game-time" aria-live="off">{{ time }}</span>
  </div>
  <div class="game-scorer">
    Your Score:&nbsp;<span
      class="game-score"
      aria-live="polite"
      aria-atomic="true"
      aria-label="Score: {{ currentIndex }}"
      >{{ currentIndex }}</span
    >
  </div>
  <div class="game-push-area">
    <div class="game-push-area-header" aria-hidden="true">
      <div>I</div>
      <div>II</div>
      <div>III</div>
    </div>
    <div
      class="game-push-area-target"
      cdkDropListGroup
      role="group"
      aria-label="Drop zones for verb forms"
    >
      @for (key of keys; track key) {
        <div
          id="{{ key }}"
          cdkDropList
          [cdkDropListEnterPredicate]="enterPredicate"
          [cdkDropListConnectedTo]="['item-0', 'item-1', 'item-2']"
          (cdkDropListDropped)="drop($event, key)"
          role="region"
          [attr.aria-label]="getDropZoneLabel(key)"
        >
          @if (selected[key]) {
            <span class="selected-item">{{ selected[key] }}</span>
            @if (!isGameOver) {
              <mat-icon
                (click)="onSelectedItemCloseClick(key)"
                (keyup.enter)="onSelectedItemCloseClick(key)"
                (keyup.space)="onSelectedItemCloseClick(key)"
                class="close-icon"
                role="button"
                tabindex="0"
                [attr.aria-label]="'Remove ' + selected[key] + ' from ' + key + ' slot'"
                >close</mat-icon
              >
            }
          }
        </div>
      }
    </div>
  </div>
  <div
    class="game-pull-area"
    role="group"
    aria-label="Available verb forms to place"
  >
    @for (item of items; track item; let i = $index) {
      <div
        id="item-{{ i }}"
        cdkDropList
        [cdkDropListConnectedTo]="['base', 'pastSimple', 'pastParticiple']"
      >
        @if (item) {
          <span
            class="drag-item"
            cdkDrag
            [cdkDragData]="{ item: item, index: i }"
            (click)="onItemClick(i)"
            (keyup.enter)="onItemClick(i)"
            (keyup.space)="onItemClick(i)"
            role="button"
            tabindex="0"
            [attr.aria-label]="'Verb form: ' + item + '. Click or press Enter to place'"
            >{{ item }}</span
          >
        }
      </div>
    }
  </div>
  <div class="game-actions">
    <button
      #submitBtn
      mat-raised-button
      [disabled]="!isSelected || isGameOver"
      (click)="onCheck()"
      aria-label="Check your verb form selections"
    >
      Check
    </button>
  </div>
  <p class="how-to-play text-active text-center">
    <a
      (click)="onHowToPlayClick()"
      (keyup.enter)="onHowToPlayClick()"
      (keyup.space)="onHowToPlayClick()"
      role="button"
      tabindex="0"
      aria-haspopup="dialog"
    >How to play?</a>
  </p>
</div>
