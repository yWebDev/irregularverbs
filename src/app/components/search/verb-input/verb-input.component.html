<form>
  <mat-form-field class="form-field" appearance="fill">
    <input
      class="input"
      [placeholder]="'VERB_INPUT.PLACEHOLDER' | translate"
      [attr.aria-label]="'VERB_INPUT.VERB_ARIA' | translate"
      matInput
      [formControl]="myControl"
      [matAutocomplete]="auto"
      (input)="verbSelect.emit(null)"
    />
    <mat-autocomplete
      #auto="matAutocomplete"
      [displayWith]="getOptionLabel"
      (optionSelected)="onSelect($event)"
    >
      @for (option of options$ | async; track option) {
        <mat-option [value]="option">
          {{ option[option.matched] }}
        </mat-option>
      }
    </mat-autocomplete>
    @if (myControl.value) {
      <button
        type="button"
        mat-icon-button
        matSuffix
        [attr.aria-label]="'VERB_INPUT.CLEAR' | translate"
        (click)="clearSelectedValue()"
      >
        <mat-icon>close</mat-icon>
      </button>
    }
  </mat-form-field>
</form>
