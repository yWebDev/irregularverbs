<a class="skip-link" href="#main-content">Skip to main content</a>
<header class="header" role="banner">
  <h1><a routerLink="/">Irregular Verbs</a></h1>
</header>
<main class="main" cdkScrollable>
  <nav class="navigation" aria-label="Main navigation">
    <ul role="list">
      <li>
        <a
          routerLink="/"
          [routerLinkActive]="['is-active']"
          [routerLinkActiveOptions]="{ exact: true }"
          [attr.aria-current]="isCurrentRoute('/') ? 'page' : null"
          >Verbs Search</a
        >
      </li>
      <li>
        <a
          routerLink="/game"
          [routerLinkActive]="['is-active']"
          [attr.aria-current]="isCurrentRoute('/game') ? 'page' : null"
          >Verbs Game</a
        >
      </li>
      <li>
        <a
          routerLink="/verbs"
          [routerLinkActive]="['is-active']"
          [attr.aria-current]="isCurrentRoute('/verbs') ? 'page' : null"
          >Verbs Table</a
        >
      </li>
    </ul>
    <div>
      @if (username) {
        <a
          rel="nofollow"
          class="account"
          [matMenuTriggerFor]="menu"
          [attr.aria-label]="'Account menu for ' + username"
        >
          <span>{{ username }}</span>
          <mat-icon aria-hidden="true">account_circle</mat-icon>
        </a>
      }
      <mat-menu #menu="matMenu">
        <button class="delete-action" mat-menu-item (click)="onDelete()">
          <mat-icon aria-hidden="true">delete</mat-icon>
          <span>Delete account</span>
        </button>
      </mat-menu>
    </div>
  </nav>
  <div id="main-content" class="container" tabindex="-1" appRouterFocus>
    <router-outlet></router-outlet>
  </div>
</main>
<footer class="footer">
  <span
    >Created by
    <a
      class="link-contact"
      title="yWebDev"
      href="https://github.com/yWebDev/irregularverbs"
      rel="noopener noreferrer"
      target="_blank"
      >yWebDev</a
    ></span
  >
  <a
    type="button"
    class="btn-donate"
    title="Donate"
    href="https://donatello.to/iverbs"
    rel="noopener noreferrer"
    target="_blank"
    >Donate</a
  >
</footer>
